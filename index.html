            scene = new THREE.Scene(); camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 100); camera.position.set(1, 0.2, 2);

            const mainLight = new THREE.DirectionalLight(0xffffff, 1.2); mainLight.position.set(2, 5, 4); mainLight.castShadow = true; mainLight.shadow.mapSize.width = 2048; mainLight.shadow.mapSize.height = 2048;

        async function sendToVercel(msg) {
            if (!msg.trim()) return; 
            if (msg !== "Опиши це фото як маркетолог" && !msg.startsWith("Клієнт щойно")) appendChat(msg, 'user'); 
            
            document.getElementById('ai-input').value = ''; captainSpeak('...', true);
            
            const payload = { message: msg };
            if (currentImageBase64) { payload.imageBase64 = currentImageBase64; currentImageBase64 = null; } 

            try { 
                const res = await fetch(VERCEL_API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }); 
                const data = await res.json(); 
                const reply = data.speech || data.reply || data.text || "Мяу, щось пішло не так."; 
                appendChat(reply, 'bot'); 
                captainSpeak(reply); 
            } catch (err) { 
                appendChat("Помилка зв'язку з сервером.", 'bot'); 
                captainSpeak("Вибачте, втрачено зв'язок із сервером."); 
            }
        }

        document.getElementById('orderButton').addEventListener('click', async () => {
            const btn = document.getElementById('orderButton'); const phone = document.getElementById('customerPhone').value.trim();
            if (!phone) { showToast("Вкажіть телефон!", "error"); return; }
            btn.disabled = true; btn.innerHTML = "⏳ Надсилаємо...";
            try { await new Promise(r => setTimeout(r, 1200)); showToast("Замовлення надіслано!", "success"); captainSpeak("Фото у нас! Скоро передзвонимо."); document.getElementById('customerPhone').value = ''; } 
            catch { showToast("Помилка", "error"); } finally { btn.disabled = false; btn.innerHTML = "🚀 Замовити друк"; }
        });
    </script>
</body>
</html>
