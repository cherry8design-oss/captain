        const clock = new THREE.Clock(); const VERCEL_API = 'https://project-6phnz.vercel.app/api/chat';

        }

        function initMainScene() {
            scene = new THREE.Scene(); camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 100); camera.position.set(1, 0.2, 2);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" }); 
            renderer.setSize(container.clientWidth || 100, container.clientHeight || 100); 
            
            const maxPixelRatio = window.innerWidth < 768 ? 1.5 : 2;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, maxPixelRatio));

            renderer.toneMapping = THREE.ACESFilmicToneMapping; 
            renderer.toneMappingExposure = 1.1; 
            renderer.xr.enabled = true; container.appendChild(renderer.domElement);
            
            controls = new OrbitControls(camera, renderer.domElement); controls.enableDamping = true; controls.dampingFactor = 0.05; controls.maxPolarAngle = Math.PI / 2 + 0.1; controls.autoRotate = true; controls.autoRotateSpeed = 0.5; controls.enablePan = false; 
            
            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;
            
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.5)); 
            
            const mainLight = new THREE.DirectionalLight(0xffffff, 0.8); mainLight.position.set(2, 5, 4); mainLight.castShadow = true; mainLight.shadow.mapSize.width = 1024; mainLight.shadow.mapSize.height = 1024; 
            mainLight.shadow.camera.top = 2; mainLight.shadow.camera.bottom = -2; mainLight.shadow.camera.left = -2; mainLight.shadow.camera.right = 2; scene.add(mainLight);

            backLight = new THREE.DirectionalLight(0xffeedd, 2.0);

            renderer.setAnimationLoop((timestamp, frame) => {

                else if (frame) {

                    if (hitTestSource) { const hitTestResults = frame.getHitTestResults(hitTestSource); if (hitTestResults.length > 0) { const pose = hitTestResults[0].getPose(referenceSpace); reticle.visible = true; reticle.matrix.fromArray(pose.transform.matrix); } else { reticle.visible = false; } }
                }
                
                if(particleSystem) particleSystem.rotation.y += 0.0005; 
                
                if(confetti && confetti.visible) {

        async function captainSpeak(text, isThinking = false) {
            if (isThinking) {
                bubbleText.textContent = '...'; bubbleDots.style.visibility = 'visible'; bubble.style.display = 'block'; isTalking = false; return;
            }
            bubbleText.textContent = text; bubbleDots.style.visibility = 'hidden'; bubble.style.display = 'block'; bubble.style.opacity = '1';

            try {
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'xi-api-key': ELEVEN_LABS_API_KEY },
                    body: JSON.stringify({ text: text, model_id: 'eleven_multilingual_v2', voice_settings: { stability: 0.5, similarity_boost: 0.75 } })
                });
                if (!response.ok) throw new Error('ElevenLabs API error');
                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                audio.volume = 0.4; 
                audio.onplay = () => { isTalking = true; };
                audio.onended = () => { isTalking = false; setTimeout(() => bubble.style.display = 'none', 2000); };
                audio.play();
            } catch (err) {
                console.warn("Audio Error:", err);
                isTalking = false; setTimeout(() => bubble.style.display = 'none', 5000);
            }
        }

        function appendChat(text, type) { const div = document.createElement('div'); div.className = `chat-item ${type === 'user' ? 'chat-user' : 'chat-bot'}`; div.textContent = text; chatHistory.appendChild(div); chatHistory.scrollTop = chatHistory.scrollHeight; }

        async function sendToVercel(msg, isUserMessage = false) {
            if (!msg.trim() || isAIProcessing) return; 
            isAIProcessing = true; 
            
            if (isUserMessage) appendChat(msg, 'user'); 
            
            document.getElementById('ai-input').value = ''; captainSpeak('...', true);
            
            const payload = { message: msg };
            if (currentImageBase64) { 
                payload.imageBase64 = currentImageBase64; 
                currentImageBase64 = null; 
            } 

            try { 
                const res = await fetch(VERCEL_API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }); 
                const data = await res.json(); 
                const reply = data.speech || data.reply || data.text || "Це виглядає надзвичайно смачно, бос."; 
                
                if (isUserMessage || msg === "Опиши це фото як маркетолог") {
                     appendChat(reply, 'bot'); 
                }
                captainSpeak(reply); 
            } catch (err) { 
                appendChat("Втрачено зв'язок.", 'bot'); 
                captainSpeak("Вибачте, втрачено зв'язок із сервером."); 
            } finally {
                setTimeout(() => { isAIProcessing = false; }, 3000); 
            }
        }

            img.onload = () => {
                document.getElementById('previewImage').src = img.src; 
                currentTexture = new THREE.Texture(img); currentTexture.needsUpdate = true; currentTexture.colorSpace = THREE.SRGBColorSpace; 
                generateSmartSizes(img.width, img.height); 
                
                const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                const MAX_SIZE = 300; let w = img.width, h = img.height;
                if (w > h) { if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; } } else { if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; } }
                canvas.width = w; canvas.height = h; ctx.drawImage(img, 0, 0, w, h);
                currentImageBase64 = canvas.toDataURL('image/jpeg', 0.6); 
                
                createConfettiExplosion();
                
                captainSpeak("Ух ти! Просто вибух смаку! Дайте но я погляну...", true);
                setTimeout(() => { sendToVercel("Опиши це фото як маркетолог"); }, 1500);
            };
            img.src = await new Promise((res) => { const reader = new FileReader(); reader.onload = (ev) => res(ev.target.result); reader.readAsDataURL(file); });
        }

        function createConfettiExplosion() {
            if(confetti) scene.remove(confetti);
            const particleCount = window.innerWidth < 768 ? 300 : 800;
            const geo = new THREE.BufferGeometry();
            const posArray = new Float32Array(particleCount * 3);
            const colorArray = new Float32Array(particleCount * 3);
            
            for(let i=0; i < particleCount; i++) {
                posArray[i*3] = (Math.random()-0.5) * 0.2; 
                posArray[i*3+1] = (Math.random()-0.5) * 0.2;
                posArray[i*3+2] = (Math.random()-0.5) * 0.2;
                colorArray[i*3] = Math.random();
                colorArray[i*3+1] = Math.random();
                colorArray[i*3+2] = Math.random();
            }
            geo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
            
            const mat = new THREE.PointsMaterial({
                size: window.innerWidth < 768 ? 0.03 : 0.05,
                map: particleSystem.material.map, 
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            
            confetti = new THREE.Points(geo, mat);
            scene.add(confetti);
            confetti.visible = true;
            confettiTime = 0;
        }

        // ФІКС 1: Робоче красиве фото з Вікіпедії + надійний фоллбек (onerror)
        function loadDefaultTexture() { 
            const img = new Image(); img.crossOrigin = "anonymous"; 
            img.onload = () => { 
                currentTexture = new THREE.Texture(img); currentTexture.needsUpdate = true; currentTexture.colorSpace = THREE.SRGBColorSpace; 
                generateSmartSizes(img.width, img.height); 
                
                const cherryLoader = document.getElementById('cherry-loader');
                cherryLoader.style.opacity = '0';
                setTimeout(() => cherryLoader.style.display = 'none', 300);
            }; 
            img.onerror = () => {
                // Якщо і це фото колись впаде, створиться базове сіре полотно з текстом (без помилки 404)
                const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
                const ctx = canvas.getContext('2d'); ctx.fillStyle = '#f9fafb'; ctx.fillRect(0,0,512,512);
                ctx.fillStyle = '#d90429'; ctx.font = 'bold 32px Inter, sans-serif'; ctx.textAlign = 'center'; ctx.fillText('Завантажте фото', 256, 256);
                currentTexture = new THREE.CanvasTexture(canvas); currentTexture.colorSpace = THREE.SRGBColorSpace;
                generateSmartSizes(512, 512);
                const cherryLoader = document.getElementById('cherry-loader');
                cherryLoader.style.opacity = '0';
                setTimeout(() => cherryLoader.style.display = 'none', 300);
            };
            // Нове, надійне джерело (Вікіпедія): Ван Гог "Зоряна Ніч"
            img.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg/1024px-Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg'; 
        }
        
        function generateSmartSizes(w, h) { 
            const aspect = w / h; const isLand = aspect >= 1; const cAsp = isLand ? aspect : 1 / aspect; const box = document.getElementById('sizeOptionsContainer'); box.innerHTML = ''; const arr = [30, 40, 50, 60, 80], tiles = []; const uniq = new Set(); 
            arr.forEach(l => { let s = Math.round((l / cAsp) / 5) * 5; if (s < 20) s = 20; let w_cm = isLand ? l : s; let h_cm = isLand ? s : l; const key = `${w_cm}x${h_cm}`; if (!uniq.has(key)) { uniq.add(key); tiles.push({ w: w_cm, h: h_cm, p: EXACT_PRICES[key] || (Math.floor(((w_cm * h_cm / 10000) * 2100 + 180) / 10) * 10 + 9) }); } }); 
            
            tiles.forEach((d, i) => { 
                const lbl = document.createElement('label'); lbl.className = `size-tile`; lbl.innerHTML = `${i === 1 ? '<div class="badge-hit">Хіт 🔥</div>' : ''}<input type="radio" name="sz" value="${d.w},${d.h},${d.p}"><span class="st-size">${d.w} × ${d.h} см</span><span class="st-price">${d.p} ₴</span>`; 
                lbl.querySelector('input').addEventListener('change', (e) => { 
                    document.querySelectorAll('.size-tile').forEach(t => t.classList.remove('active')); lbl.classList.add('active'); 
                    const [nw, nh, np] = e.target.value.split(','); 
                    currentWidthCm = parseInt(nw); currentHeightCm = parseInt(nh); 
                    document.getElementById('priceValue').textContent = np; 
                    buildCanvas3D(currentWidthCm / 100, currentHeightCm / 100, currentTexture); 
                    autoFrameCamera(currentWidthCm / 100, currentHeightCm / 100); 

                    if (document.getElementById('imageInput').files.length > 0) {
                        if (currentWidthCm >= 60 || currentHeightCm >= 60) {
                            sendToVercel(`Клієнт вибрав великий розмір ${currentWidthCm}x${currentHeightCm}. Скажи, що це буде виглядати дуже солідно і масштаб вражає.`);
                        } else if (currentWidthCm <= 30 && currentHeightCm <= 30) {
                            sendToVercel(`Клієнт вибрав розмір ${currentWidthCm}x${currentHeightCm}. Скажи, що це чудовий вибір для затишного подарунка або на робочий стіл.`);
                        }
                    }
                }); 
                box.appendChild(lbl); 
                if (i === 1 || (i === 0 && tiles.length === 1)) { lbl.classList.add('active'); lbl.querySelector('input').checked = true; currentWidthCm = d.w; currentHeightCm = d.h; document.getElementById('priceValue').textContent = d.p; } 
            }); 
            buildCanvas3D(currentWidthCm / 100, currentHeightCm / 100, currentTexture); autoFrameCamera(currentWidthCm / 100, currentHeightCm / 100); 
        }

        function autoFrameCamera(w, h) { if (!container || container.clientWidth === 0 || container.clientHeight === 0) return; const screenW = container.clientWidth; const screenH = container.clientHeight; const activeW = window.innerWidth > 768 ? screenW - 460 : screenW; const activeH = window.innerWidth > 768 ? screenH : screenH * 0.5; const offX = window.innerWidth > 768 ? -230 : 0, offY = window.innerWidth > 768 ? 0 : (screenH - activeH) / 2; const fovRad = camera.fov * (Math.PI / 180); let tz = Math.max((h * 1.2) / (2 * Math.tan(fovRad/2) * (activeH/screenH)), (w * 1.2) / (2 * Math.tan(fovRad/2) * (activeW/screenH))); if (tz > 8) tz = 8; if (tz < 0.3) tz = 0.3; const dir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize(); if (dir.lengthSq() < 0.1) dir.set(0.35, 0.15, 0.9).normalize(); camera.position.copy(controls.target).add(dir.multiplyScalar(tz)); camera.setViewOffset(screenW, screenH, offX, offY, screenW, screenH); camera.updateProjectionMatrix(); controls.update(); }
        function resizeCanvas() { if (!container || container.clientWidth === 0 || container.clientHeight === 0) return; camera.aspect = container.clientWidth / container.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(container.clientWidth, container.clientHeight); autoFrameCamera(currentWidthCm / 100, currentHeightCm / 100); if(capContainerView && capContainerView.clientWidth > 0) { capCamera.aspect = capContainerView.clientWidth / capContainerView.clientHeight; capCamera.updateProjectionMatrix(); capRenderer.setSize(capContainerView.clientWidth, capContainerView.clientHeight); } }

        document.getElementById('orderButton').addEventListener('click', async () => {
            const btn = document.getElementById('orderButton');
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const price = document.getElementById('priceValue').textContent;
            const fileInput = document.getElementById('imageInput');

            const cleanPhone = phone.replace(/\D/g, "");
            const phoneRegex = /^\+?3?8?(0\d{9})$/;
            
            if (!phoneRegex.test(cleanPhone) || cleanPhone.length < 10) { 
                showToast("Введіть коректний номер телефону (напр. 0931234567)!", "error"); 
                return; 
            }
            if (!fileInput.files[0]) {
                showToast("Будь ласка, завантажте фото!", "error");
                return;
            }

            btn.disabled = true; 
            btn.innerHTML = "⏳ Надсилаємо...";

            const formData = new FormData();
            formData.append('action', 'cherry_new_order');
            formData.append('image', fileInput.files[0]);
            formData.append('name', name);
            formData.append('phone', phone);
            formData.append('price', price);
            formData.append('width', currentWidthCm);
            formData.append('height', currentHeightCm);

            try {
                const response = await fetch('/wp-admin/admin-ajax.php', { method: 'POST', body: formData });
                const result = await response.json();

                if (result.success) {
                    showToast("Замовлення надіслано!", "success");
                    captainSpeak("Все прийняв, бос! Твоє замовлення вже у нас. Скоро наберемо, щоб уточнити деталі доставки.");
                    document.getElementById('customerPhone').value = '';
                    document.getElementById('customerName').value = '';
                } else {
                    showToast(result.data || "Помилка відправки", "error");
                }
            } catch (err) { 
                showToast("Помилка зв'язку з сервером", "error"); 
            } finally { 
                btn.disabled = false; 
                btn.innerHTML = "🚀 Замовити друк"; 
            }
        });
    </script>
